<div class="ad-wrap">

  <div class="ad-card">

    <div class="ad-icon-wrap">
      <mat-icon class="ad-icon">lock</mat-icon>
    </div>

    <h1 class="ad-code">403</h1>
    <h2 class="ad-title">Access Denied</h2>

    <p class="ad-message">
      @if (userName) {
        Sorry, <strong>{{ userName }}</strong> — you don't have permission to view this page.
      } @else {
        You don't have permission to view this page.
      }
      <br>
      Please contact your administrator if you believe this is an error.
    </p>


  </div>

</div>
