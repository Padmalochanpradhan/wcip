<h2 mat-dialog-title class="txupper" style="text-align:center">
  {{ data.title }}
</h2>

<mat-dialog-content style="max-height: 350px;">
  <mat-card>
    <mat-card-content>

      <form [formGroup]="addUserFormGroup" (ngSubmit)="submitUser()"> 

        <!-- ROLE -->
        <mat-form-field appearance="outline" class="mr common-field">
          <mat-label>ROLE</mat-label>
          <mat-select formControlName="role_id" class="txupper">
            <mat-option class="txupper" *ngFor="let r of data.roles" [value]="r.ID">
              {{ r.ROLE_NAME }}
            </mat-option>
          </mat-select>

          <mat-error *ngIf="
            addUserFormGroup.get('role_id')?.touched &&
            addUserFormGroup.get('role_id')?.invalid">
            Role is required
          </mat-error>
        </mat-form-field>         
   
        <!-- PAGES -->
        <mat-form-field appearance="outline" class="mr common-field mt-5" >
          <mat-label>PAGES</mat-label>
          <mat-select formControlName="page_id" class="txupper">
            <mat-option class="txupper" *ngFor="let d of data.pagelist" [value]="d.id">
              {{ d.page_name }}
            </mat-option>
          </mat-select>

          <mat-error *ngIf="
            addUserFormGroup.get('page_id')?.touched &&
            addUserFormGroup.get('page_id')?.invalid">
            Page is required
          </mat-error>
        </mat-form-field>        

        <!-- STATUS -->
        <mat-form-field appearance="outline" class="common-field">
        <mat-label>STATUS</mat-label>
        <mat-select formControlName="status">
            <mat-option [value]="0">ACTIVE</mat-option>
            <mat-option [value]="1">IN-ACTIVE</mat-option>
        </mat-select>
        </mat-form-field>

        <!-- ACTION BUTTONS -->
        <div class="mt-3" style="display:flex;justify-content:space-between">
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="addUserFormGroup.invalid || isLoading">
            {{ isEditMode ? 'UPDATE' : 'SUBMIT' }}
          </button>
        <!-- ERROR MESSAGE (CENTER) -->
        <div *ngIf="errorMessage" class="error-message-center">
          <mat-icon color="warn">error</mat-icon>
          <span>{{ errorMessage }}</span>
        </div>
          <button
            mat-raised-button
            color="warn"
            type="button"
            (click)="close()">
            CANCEL
          </button>
        </div>

      </form>
      <div class="loader-backdrop" *ngIf="isLoading">
        <mat-spinner diameter="60"></mat-spinner>
      </div>

    </mat-card-content>
  </mat-card>
</mat-dialog-content>
