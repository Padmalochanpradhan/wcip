<h2 mat-dialog-title class="txupper" style="text-align:center">
  {{ data.title }}
</h2>

<mat-dialog-content style="max-height: 70vh;">
  <mat-card >
    <mat-card-content >

      <form [formGroup]="userCreationFormGroup" (ngSubmit)="submitRequest()" >

        <!-- FIRST NAME -->
        <mat-form-field appearance="outline"  style="width: 100%;">
          <mat-label>FIRST NAME</mat-label>
          <input matInput formControlName="first_name">
          <mat-error *ngIf="
            userCreationFormGroup.get('first_name')?.touched &&
            userCreationFormGroup.get('first_name')?.invalid">
            First name is required
          </mat-error>
        </mat-form-field>

        <!-- LAST NAME -->
        <mat-form-field appearance="outline"  style="width: 100%;">
          <mat-label>LAST NAME</mat-label>
          <input matInput formControlName="last_name">
          <mat-error *ngIf="
            userCreationFormGroup.get('last_name')?.touched &&
            userCreationFormGroup.get('last_name')?.invalid">
            Last name is required
          </mat-error>
        </mat-form-field>

        <!-- EMAIL -->
        <mat-form-field appearance="outline"  style="width: 100%;">
        <mat-label>EMAIL</mat-label>
        <input matInput formControlName="email">

        <mat-error *ngIf="userCreationFormGroup.get('email')?.touched">
          <span *ngIf="userCreationFormGroup.get('email')?.hasError('required')">
            Email is required
          </span>
          <span *ngIf="userCreationFormGroup.get('email')?.hasError('email')">
            Enter a valid email address
          </span>
        </mat-error>
      </mat-form-field>

         <!-- PHONE -->
        <mat-form-field appearance="outline"  style="width: 100%;">
          <mat-label>PHONE</mat-label>
          <input matInput formControlName="phone" maxlength="14" (input)="formatPhone($event)">
          <mat-error *ngIf="
            userCreationFormGroup.get('phone')?.touched &&
            userCreationFormGroup.get('phone')?.invalid">
            Phone is required
          </mat-error>
        </mat-form-field>

         <mat-form-field appearance="outline"  style="width: 100%;" class="txupper">
        <mat-label>ROLE</mat-label>
        <mat-select formControlName="role_id">
           <mat-option class="txupper" *ngFor="let r of this.roles" [value]="r.ID">
              {{ r.ROLE_NAME }}
            </mat-option>
        </mat-select>
        <mat-error *ngIf="userCreationFormGroup.get('role_id')?.touched &&  userCreationFormGroup.get('role_id')?.invalid">
            Role is required
          </mat-error> 
        </mat-form-field>

        <!-- START DATE -->
        <mat-form-field appearance="outline"  style="width: 100%;">
          <mat-label>REQUEST DATE</mat-label>
          <input matInput [matDatepicker]="dp" formControlName="request_date">
          <mat-datepicker-toggle matSuffix [for]="dp"></mat-datepicker-toggle>
          <mat-datepicker #dp></mat-datepicker>
          <mat-error *ngIf="userCreationFormGroup.get('request_date')?.touched &&  userCreationFormGroup.get('request_date')?.invalid">
            Request date required
          </mat-error> 
        </mat-form-field> 

        <!-- STATUS -->
        <mat-form-field appearance="outline"  style="width: 100%;">
        <mat-label>STATUS</mat-label>
        <mat-select formControlName="status">
            <mat-option value="0">NEW</mat-option>
            <mat-option value="1">IN-PROCESS</mat-option>
            <mat-option value="2">COMPLETED</mat-option>
            <mat-option value="3">CANCELED</mat-option>
        </mat-select>
        <mat-error *ngIf="userCreationFormGroup.get('status')?.touched &&  userCreationFormGroup.get('status')?.invalid">
            Status required
          </mat-error> 
        </mat-form-field>

        <!-- ACTION BUTTONS -->
        <div class="mt-3" style="display:flex;justify-content:space-between">
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="userCreationFormGroup.invalid || isLoading">
            {{ isEditMode ? 'UPDATE' : 'SUBMIT' }}
          </button>

          <button
            mat-raised-button
            color="warn"
            type="button"
            (click)="close()">
            CANCEL
          </button>
        </div>

      </form>
      <div class="loader-backdrop" *ngIf="isLoading">
        <mat-spinner diameter="60"></mat-spinner>
      </div>

    </mat-card-content>
  </mat-card>
</mat-dialog-content>
