<h2 mat-dialog-title class="text-center txupper">{{ data.title }}</h2>

<mat-dialog-content>
    <div style="display:flex; justify-content:flex-end;">
        <div style="justify-content:left;">
            <mat-paginator   #mainPaginator [pageSizeOptions]="[10, 25, 50, 100]"
                [pageSize]="10"></mat-paginator>
        </div>

        <mat-form-field appearance="outline" class="search-box">
            <mat-label>Search</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="Search records">
        </mat-form-field>
    </div>
    <table mat-table [dataSource]="dataSource" matSort #mainSort="matSort" class="w-100 txupper">

        <!-- SL -->
        <ng-container matColumnDef="sl">
            <th mat-header-cell *matHeaderCellDef> SL. NO </th>
            <td mat-cell *matCellDef="let row; let i = index"> {{ i + 1 }} </td>
        </ng-container>

        <!-- Relevant Date -->
        <ng-container matColumnDef="MEASURE_NAME" >
            <th mat-header-cell *matHeaderCellDef mat-sort-header> MEASURE NAME </th>
            <td mat-cell *matCellDef="let row">
                {{  row.MEASURE_NAME }}
            </td>
        </ng-container>

        <!-- HCC CATEGORY -->
        <ng-container matColumnDef="SUB_MEASURE" >
            <th mat-header-cell *matHeaderCellDef mat-sort-header> SUB MEASURE </th>
            <td mat-cell *matCellDef="let row"> {{ row.SUB_MEASURE }} </td>
        </ng-container>

        <!-- HCC MODEL -->
        <ng-container matColumnDef="PROVIDER_ID">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> PROVIDER ID </th>
            <td mat-cell *matCellDef="let row"> {{ row.PROVIDER_ID }} </td>
        </ng-container>

        <!-- DIAG CODE -->
        <ng-container matColumnDef="PROVIDER_NAME">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> PROVIDER NAME </th>
            <td mat-cell *matCellDef="let row"> {{ row.PROVIDER_NAME }} </td>
        </ng-container>

        
        <!-- STATUS -->
        <ng-container matColumnDef="PROCESS_STATUS">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> STATUS </th>
            <td mat-cell *matCellDef="let row">
                {{ row.PROCESS_STATUS === 1 ? 'COMPLETE' : 'OPEN' }}
            </td>
        </ng-container>

        <!-- PROCESS DATE -->
        <ng-container matColumnDef="ADDED_DATE">
            <th mat-header-cell *matHeaderCellDef mat-sort-header style="background-color: #ddd;"> PROCESS DATE </th>
            <td mat-cell *matCellDef="let row" style="background-color: #ddd;">
                {{ formatDate(row.ADDED_DATE) }}
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

    </table>

    <mat-dialog-actions align="end" class="txupper" style="padding-right:0px;">    
        <button mat-raised-button color="primary" (click)="close()">Close</button>
    </mat-dialog-actions>


</mat-dialog-content>
