
<h2 mat-dialog-title class="txupper" style="text-align:center">
  {{ data.title }}
</h2>

<mat-dialog-content style="max-height: 350px;">
  <mat-card>
    <mat-card-content>

      <form [formGroup]="plansFormGroup" (ngSubmit)="submitPlan()">

        <!-- FIRST NAME -->
        <mat-form-field appearance="outline" class="mr" style="width: 49.5%;">
          <mat-label>PLAN NAME</mat-label>
          <input matInput formControlName="plan_name">

          <mat-error *ngIf="
            plansFormGroup.get('plan_name')?.touched &&
            plansFormGroup.get('plan_name')?.invalid">
            Plan name is required
          </mat-error>
        </mat-form-field>

        <!-- START DATE -->
        <mat-form-field appearance="outline" style="width: 49.5%;">
          <mat-label>START DATE</mat-label>
          <input matInput [matDatepicker]="dp" formControlName="start_date">
          <mat-datepicker-toggle matSuffix [for]="dp"></mat-datepicker-toggle>
          <mat-datepicker #dp></mat-datepicker>
          <mat-error *ngIf="plansFormGroup.get('start_date')?.touched &&  plansFormGroup.get('start_date')?.invalid">
            Start date required
          </mat-error> 
        </mat-form-field>
        
        <!-- END DATE -->
        <mat-form-field appearance="outline" class="mr" style="width: 49.5%;">
          <mat-label>END DATE</mat-label>
          <input matInput [matDatepicker]="dp1" formControlName="end_date">
          <mat-datepicker-toggle matSuffix [for]="dp1"></mat-datepicker-toggle>
          <mat-datepicker #dp1></mat-datepicker>
          <mat-error *ngIf="plansFormGroup.get('end_date')?.touched &&  plansFormGroup.get('end_date')?.invalid">
            End date required
          </mat-error> 
        </mat-form-field>

        <!-- STATUS -->
        <mat-form-field appearance="outline" style="width: 49.5%;">
        <mat-label>STATUS</mat-label>
        <mat-select formControlName="status">
            <mat-option [value]="0">ACTIVE</mat-option>
            <mat-option [value]="1">IN-ACTIVE</mat-option>
        </mat-select>
        <mat-error *ngIf="plansFormGroup.get('status')?.touched &&  plansFormGroup.get('status')?.invalid">
            Plan status required
          </mat-error> 
        </mat-form-field>

        <!-- ACTION BUTTONS -->
        <div class="mt-3" style="display:flex;justify-content:space-between">
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="plansFormGroup.invalid || isLoading">
            {{ isEditMode ? 'UPDATE' : 'SUBMIT' }}
          </button>

          <button
            mat-raised-button
            color="warn"
            type="button"
            (click)="close()">
            CANCEL
          </button>
        </div>

      </form>
      <div class="loader-backdrop" *ngIf="isLoading">
        <mat-spinner diameter="60"></mat-spinner>
      </div>

    </mat-card-content>
  </mat-card>
</mat-dialog-content>
