<div mat-dialog-content class="warning-content">
  <mat-icon color="warn">
    {{ isExpired ? 'lock' : 'warning' }}
  </mat-icon>
  <p>{{ data.message }}</p>
</div>

<div mat-dialog-actions align="center">
  <!-- ❌ Skip disabled if password expired -->
  <button
    *ngIf="!isExpired"
    mat-stroked-button
    color="primary"
    (click)="skip()">
    Skip
  </button>

  <!-- ✅ Mandatory reset -->
  <button
    mat-raised-button
    color="warn"
    (click)="changePassword()">
    {{ isExpired ? 'Reset Password' : 'Change Password' }}
  </button>
</div>
