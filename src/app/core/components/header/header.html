<mat-toolbar color="primary" class="header-toolbar d-flex justify-content-between align-items-center" style="background-color:darkturquoise;">

  <!-- Left Section -->
  <div class="header-left d-flex align-items-center ps-2" style="width: 33%;">
     <button mat-icon-button (click)="drawer.toggle()" style="color:#fff!important;">
      <mat-icon>menu</mat-icon>
    </button>

    <img src="assets/images/left-logo.svg" alt="Company Logo" class="logo-img" />
  </div>
    <span class="spacer"></span>

  <!-- Center Title -->
  <div class="header-title text-center">
    <div class="title-wrapper">
      <div class="bar1"></div>
      <span class="divider-heading txupper"  ><h1>{{ title$ | async }}</h1></span>
      <div class="bar1"></div>
    </div>
  </div>
    <span class="spacer"></span>

  <!-- Right Section -->
   <div class="header-right d-flex align-items-center" style="width: 33%;">

    <!-- Notifications -->
    <button mat-icon-button [matMenuTriggerFor]="notificationMenu" >
      <mat-icon style="color:#fff!important;">notifications</mat-icon>
      <span class="badge-circle">0</span>
    </button>

    <mat-menu #notificationMenu="matMenu">
      <div class="menu-header">
        You have 0 new notifications
      </div>
      <mat-divider></mat-divider>
      <button mat-menu-item>Show all notifications</button>
    </mat-menu>

    <!-- Messages -->
    <button mat-icon-button [matMenuTriggerFor]="messageMenu">
       <mat-icon style="color:#fff!important;">chat</mat-icon>
      <span class="badge-circle badge-success">3</span>
    </button>

    <mat-menu #messageMenu="matMenu" class="message-menu">
      <div class="menu-header" style="padding:0px 10px!important;">
        You have 3 new messages
      </div>
      <mat-divider></mat-divider>

      <button mat-menu-item class="message-item">
        <div style="float:left;"><img src="assets/images/messages-1.jpg" class="rounded-circle me-2" /></div>
        <div class="text_mes">
          <strong>Maria Hudson</strong>
          <div class="msg-text">Velit asperiores et ducimus...</div>
          <small>4 hrs. ago</small>
        </div>
      </button>

      <button mat-menu-item class="message-item">
        <div style="float:left;"><img src="assets/images/messages-2.jpg" class="rounded-circle me-2" /></div>
        <div class="text_mes">
          <strong>Anna Nelson</strong>
          <div class="msg-text">Velit asperiores et ducimus...</div>
          <small>6 hrs. ago</small>
        </div>
      </button>

      <button mat-menu-item class="message-item">
        <div style="float:left;"><img src="assets/images/messages-3.jpg" class="rounded-circle me-2" /></div>
      <div class="text_mes">
          <strong>David Muldon</strong>
          <div class="msg-text">Velit asperiores et ducimus...</div>
          <small>8 hrs. ago</small>
        </div>
      </button>

      <mat-divider></mat-divider>
      <button mat-menu-item>Show all messages</button>
    </mat-menu>

    <!-- Profile Menu -->
    <div mat-button [matMenuTriggerFor]="profileMenu" class="profile-btn">
      <div style="display: inline-flex;">
        <div> <div style="margin-top: 5px;"><mat-icon style="color:#fff!important;">arrow_drop_down</mat-icon></div></div>
        <div><img src="assets/images/noimage.jpg" class="profile-img" /></div>
      <div><span class="d-none d-md-inline text-capitalize ms-2 username" style="margin: 7px;color:#fff!important;font-size:14px!important;">{{ userName }}</span></div>
      
      </div>
                 
    </div>

    <mat-menu #profileMenu="matMenu">
      

      <button mat-menu-item>
        <mat-icon>person</mat-icon>
        My Profile
      </button>

      <button mat-menu-item>
        <mat-icon>settings</mat-icon>
        Account Settings
      </button>

      <button mat-menu-item>
        <mat-icon>help</mat-icon>
        Need Help?
      </button>

      <mat-divider></mat-divider>

      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        Sign Out
      </button>
    </mat-menu>

  </div>
   
</mat-toolbar>
